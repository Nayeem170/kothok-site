    <title>KoThok - Read - Listen - Anywhere</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("kothok-theme");
          var dark = stored ? stored === "dark" : true;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
