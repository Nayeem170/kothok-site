<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D0E10" />
    <meta
      name="description"
      content="KoThok — read your books on your Kobo e-reader, in colour, or have them read aloud to you over Bluetooth."
    />
    <meta property="og:title" content="KoThok — Read · Listen · Anywhere" />
    <meta
      property="og:description"
      content="Read your books on your Kobo e-reader, in colour, or have them read aloud to you over Bluetooth."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>KoThok — Read · Listen · Anywhere</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("kothok-theme");
          var dark = stored ? stored === "dark" : true;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
